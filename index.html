<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포켓몬 랜덤 뽑기</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #020715; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 1.5rem; }
        .result-box { min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #ccc; border-radius: 15px; margin-bottom: 1.5rem; padding: 10px; }
        #poke-img { width: 220px; height: 220px; object-fit: contain; display: none; transition: opacity 0.2s ease-in-out; }
        .info { margin-top: 15px; font-weight: bold; font-size: 1.2rem; color: #444; }
        .form-tag { font-size: 0.9rem; color: #ff4757; margin-top: 5px; }
        button { background-color: #3b4cca; color: white; border: none; padding: 12px 30px; font-size: 1rem; border-radius: 50px; cursor: pointer; transition: transform 0.1s; width: 100%; }
        button:active { transform: scale(0.95); }
        /* 멈췄을 때 튕기는 애니메이션 */
        .bounce {
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

/* 뽑기 중 버튼 비활성화 시각 효과 */
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>포켓몬 뽑기</h1>
        <div class="result-box">
            <img id="poke-img" src="" alt="포켓몬">
            <div id="poke-info" class="info">누가 나올까?</div>
            <div id="form-info" class="form-tag"></div>
        </div>
        <button onclick="drawPokemon()">랜덤 뽑기 클릭!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
